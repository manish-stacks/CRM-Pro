<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background:#0f172a; color:#f1f5f9; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #334155; background:#1e293b; color:#fff; }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 6px; }
    #loginBtn { background: #2563eb; color: #fff; }
    #checkinBtn { background: #16a34a; color: #fff; }
    #checkoutBtn { background: #dc2626; color: #fff; }
    #status { margin-top: 14px; font-size: 13px; color: #94a3b8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>HBS CRM</h2>

  <div id="loginView">
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
  </div>

  <div id="trackerView" class="hidden">
    <button id="checkinBtn">Check In</button>
    <button id="checkoutBtn" class="hidden">Check Out</button>
    <div id="status">Not checked in</div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
